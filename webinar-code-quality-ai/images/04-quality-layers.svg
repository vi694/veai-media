<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <rect width="1200" height="675" fill="#ecfeff"/>
  <text x="60" y="78" font-family="Arial" font-size="40" font-weight="700" fill="#083344">Слои защиты вокруг AI-кода</text>
  <text x="60" y="116" font-family="Arial" font-size="21" fill="#155e75">SDD и TDD полезны, но без инструментов агент всё равно может принести уязвимость или архитектурный костыль</text>
  <g font-family="Arial" font-size="22" font-weight="700">
    <rect x="180" y="165" width="840" height="70" rx="18" fill="#cffafe" stroke="#06b6d4" stroke-width="2"/><text x="240" y="210" fill="#164e63">1. Rules / AGENTS.md / .agentignore / skills / hooks</text>
    <rect x="220" y="255" width="760" height="70" rx="18" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/><text x="290" y="300" fill="#1e3a8a">2. Linters, type checks, architecture tests</text>
    <rect x="260" y="345" width="680" height="70" rx="18" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/><text x="330" y="390" fill="#166534">3. Unit / Integration / E2E / PBT / Fuzzing</text>
    <rect x="300" y="435" width="600" height="70" rx="18" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/><text x="360" y="480" fill="#92400e">4. SAST / SCA / DAST / secret scanning</text>
    <rect x="340" y="525" width="520" height="70" rx="18" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/><text x="415" y="570" fill="#991b1b">5. AI-review → triage → human</text>
  </g>
  <text x="60" y="640" fill="#0891b2" font-family="Arial" font-size="18">По мотивам слайдов 45–52</text>
</svg>
