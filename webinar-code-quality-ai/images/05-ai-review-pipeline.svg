<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <rect width="1200" height="675" fill="#f5f3ff"/>
  <text x="60" y="78" font-family="Arial" font-size="40" font-weight="700" fill="#2e1065">AI-review pipeline</text>
  <text x="60" y="116" font-family="Arial" font-size="21" fill="#6d28d9">Не один "senior reviewer", а набор узких сабагентов и отдельный triage</text>
  <defs><marker id="arr" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10" fill="#6b7280"/></marker></defs>
  <g font-family="Arial">
    <rect x="60" y="270" width="150" height="90" rx="18" fill="#fff" stroke="#7c3aed" stroke-width="3"/><text x="92" y="308" font-size="22" font-weight="700" fill="#4c1d95">PR / diff</text><text x="82" y="338" font-size="16" fill="#6b21a8">review target</text>
    <path d="M220 315 H285" stroke="#6b7280" stroke-width="3" marker-end="url(#arr)"/>
    <rect x="300" y="270" width="190" height="90" rx="18" fill="#fff" stroke="#7c3aed" stroke-width="3"/><text x="335" y="308" font-size="22" font-weight="700" fill="#4c1d95">Scope</text><text x="325" y="338" font-size="16" fill="#6b21a8">files, modules, API</text>
    <path d="M500 315 H565" stroke="#6b7280" stroke-width="3" marker-end="url(#arr)"/>
    <rect x="580" y="210" width="190" height="70" rx="16" fill="#ede9fe" stroke="#8b5cf6"/><text x="622" y="253" font-size="19" font-weight="700" fill="#4c1d95">Security</text>
    <rect x="580" y="295" width="190" height="70" rx="16" fill="#ede9fe" stroke="#8b5cf6"/><text x="610" y="338" font-size="19" font-weight="700" fill="#4c1d95">Architecture</text>
    <rect x="580" y="380" width="190" height="70" rx="16" fill="#ede9fe" stroke="#8b5cf6"/><text x="640" y="423" font-size="19" font-weight="700" fill="#4c1d95">Tests</text>
    <rect x="800" y="210" width="190" height="70" rx="16" fill="#ede9fe" stroke="#8b5cf6"/><text x="820" y="253" font-size="19" font-weight="700" fill="#4c1d95">Spec compliance</text>
    <rect x="800" y="295" width="190" height="70" rx="16" fill="#ede9fe" stroke="#8b5cf6"/><text x="840" y="338" font-size="19" font-weight="700" fill="#4c1d95">Performance</text>
    <rect x="800" y="380" width="190" height="70" rx="16" fill="#ede9fe" stroke="#8b5cf6"/><text x="850" y="423" font-size="19" font-weight="700" fill="#4c1d95">Domain</text>
    <path d="M1000 315 H1045" stroke="#6b7280" stroke-width="3" marker-end="url(#arr)"/>
    <rect x="1060" y="255" width="110" height="120" rx="18" fill="#fee2e2" stroke="#ef4444" stroke-width="3"/><text x="1082" y="305" font-size="22" font-weight="700" fill="#991b1b">Triage</text><text x="1080" y="335" font-size="15" fill="#991b1b">1 bug</text><text x="1080" y="355" font-size="15" fill="#991b1b">1 decision</text>
  </g>
  <rect x="260" y="525" width="680" height="78" rx="20" fill="#fff" stroke="#7c3aed" stroke-width="2"/>
  <text x="300" y="572" font-family="Arial" font-size="24" font-weight="700" fill="#4c1d95">Итог: короткий report для человека с файлами, строками и доказательствами</text>
  <text x="60" y="640" fill="#7c3aed" font-family="Arial" font-size="18">По мотивам слайдов 54–62</text>
</svg>
