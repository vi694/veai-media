<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 512" role="img" aria-label="Snyk-reference F1 против стандартного отклонения для SAST и конфигураций LLM">
  <style>
    .bg { fill: #ffffff; }
    .grid { stroke: #e7e4f0; stroke-width: 1; }
    .axis { stroke: #b9b2d0; stroke-width: 1.5; }
    .tick { fill: #6b6580; font: 13px -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .atitle { fill: #6b6580; font: 12px -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; letter-spacing: 1.5px; }
    .lbl { fill: #1c1830; font: 700 15px -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .sub { fill: #8a8398; font: 12px -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .pt { fill: #4a4458; }
  </style>

  <rect class="bg" x="0" y="0" width="1024" height="512"/>

  <!-- Горизонтальные линии сетки -->
  <line class="grid" x1="96" y1="64"  x2="960" y2="64"/>
  <line class="grid" x1="96" y1="156" x2="960" y2="156"/>
  <line class="grid" x1="96" y1="248" x2="960" y2="248"/>
  <line class="grid" x1="96" y1="340" x2="960" y2="340"/>
  <line class="grid" x1="96" y1="432" x2="960" y2="432"/>

  <!-- Подписи оси Y -->
  <text class="tick" x="84" y="68"  text-anchor="end">100.0%</text>
  <text class="tick" x="84" y="160" text-anchor="end">90.0%</text>
  <text class="tick" x="84" y="252" text-anchor="end">80.0%</text>
  <text class="tick" x="84" y="344" text-anchor="end">70.0%</text>
  <text class="tick" x="84" y="436" text-anchor="end">60.0%</text>

  <!-- Оси -->
  <line class="axis" x1="96" y1="64" x2="96" y2="432"/>
  <line class="axis" x1="96" y1="432" x2="960" y2="432"/>

  <!-- Подписи оси X -->
  <text class="tick" x="96"  y="454" text-anchor="middle">0.0%</text>
  <text class="tick" x="312" y="454" text-anchor="middle">1.0%</text>
  <text class="tick" x="528" y="454" text-anchor="middle">2.0%</text>
  <text class="tick" x="744" y="454" text-anchor="middle">3.0%</text>
  <text class="tick" x="960" y="454" text-anchor="middle">4.0%</text>

  <!-- Названия осей -->
  <text class="atitle" x="528" y="486" text-anchor="middle">SNYK-REFERENCE F1 STANDARD DEVIATION</text>
  <g transform="translate(30,248) rotate(-90)"><text class="atitle" x="0" y="0" text-anchor="middle">SNYK-REFERENCE F1</text></g>

  <!-- Точки данных -->
  <!-- Snyk Code SAST: 100.0% / 0.0% sd -->
  <circle cx="96" cy="64" r="15" fill="#2b1d52" stroke="#6b4cff" stroke-width="4"/>
  <text class="lbl" x="120" y="60" text-anchor="start">Snyk Code SAST</text>
  <text class="sub" x="120" y="78" text-anchor="start">100.0% / 0.0% sd</text>

  <!-- Opus 4.6 Medium: 75.4% / 0.2% sd -->
  <circle class="pt" cx="138" cy="291" r="12"/>
  <text class="lbl" x="120" y="286" text-anchor="end">Opus 4.6 Medium</text>
  <text class="sub" x="120" y="303" text-anchor="end">75.4% / 0.2% sd</text>

  <!-- Opus 4.6 High: 75.2% / 0.3% sd -->
  <circle class="pt" cx="161" cy="293" r="12"/>
  <text class="lbl" x="182" y="286" text-anchor="start">Opus 4.6 High</text>
  <text class="sub" x="182" y="303" text-anchor="start">75.2% / 0.3% sd</text>

  <!-- Sonnet 4.6 Medium: 67.4% / 0.9% sd -->
  <circle class="pt" cx="290" cy="364" r="12"/>
  <text class="lbl" x="312" y="360" text-anchor="start">Sonnet 4.6 Medium</text>
  <text class="sub" x="312" y="377" text-anchor="start">67.4% / 0.9% sd</text>

  <!-- Opus 4.7 Max: 68.8% / 2.2% sd -->
  <circle class="pt" cx="571" cy="351" r="12"/>
  <text class="lbl" x="571" y="318" text-anchor="middle">Opus 4.7 Max</text>
  <text class="sub" x="571" y="335" text-anchor="middle">68.8% / 2.2% sd</text>

  <!-- Sonnet 4.6 High: 64.9% / 3.5% sd -->
  <circle class="pt" cx="852" cy="387" r="12"/>
  <text class="lbl" x="832" y="360" text-anchor="end">Sonnet 4.6 High</text>
  <text class="sub" x="832" y="377" text-anchor="end">64.9% / 3.5% sd</text>
</svg>
