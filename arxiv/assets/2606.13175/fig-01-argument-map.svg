<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 336" role="img" aria-label="Карта аргументации: пять целей код-ревью сводятся к трём тезисам и общему выводу, из которого следуют четыре последствия">
  <defs>
    <style>
      .box{rx:10;ry:10}
      .g{fill:#6f5a2b}
      .c{fill:#2f5d44}
      .cc{fill:#2b4a73}
      .i{fill:#2c6e68}
      text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;fill:#fff}
      .h{font-size:12.5px;font-weight:700;fill:#fff}
      .t{font-size:12px;fill:#f1efe9}
      .eyebrow{font-size:11px;font-weight:700;letter-spacing:2px;fill:#cdddf2}
      .title{font-size:14px;font-weight:700;fill:#fff}
      .lnG{stroke:#6f5a2b}
      .lnC{stroke:#2f5d44}
      .lnI{stroke:#2c6e68}
      .ln{fill:none;stroke-width:1.6;stroke-linecap:round}
    </style>
    <marker id="arO" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#6f5a2b"/>
    </marker>
    <marker id="arC" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#2f5d44"/>
    </marker>
    <marker id="arI" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#2c6e68"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="336" fill="#ffffff"/>

  <!-- arrows: goals -> claims -->
  <g class="ln lnG" marker-end="url(#arO)">
    <line x1="204" y1="46"  x2="266" y2="72"/>
    <line x1="204" y1="107" x2="266" y2="72"/>
    <line x1="204" y1="107" x2="266" y2="168"/>
    <line x1="204" y1="168" x2="266" y2="72"/>
    <line x1="204" y1="168" x2="266" y2="168"/>
    <line x1="204" y1="168" x2="266" y2="264"/>
    <line x1="204" y1="229" x2="266" y2="168"/>
    <line x1="204" y1="229" x2="266" y2="264"/>
    <line x1="204" y1="290" x2="266" y2="264"/>
  </g>

  <!-- arrows: claims -> conclusion -->
  <g class="ln lnC" marker-end="url(#arC)">
    <line x1="480" y1="72"  x2="536" y2="142"/>
    <line x1="480" y1="168" x2="536" y2="168"/>
    <line x1="480" y1="264" x2="536" y2="194"/>
  </g>

  <!-- arrows: conclusion -> implications -->
  <g class="ln lnI" marker-end="url(#arI)">
    <line x1="760" y1="144" x2="826" y2="51"/>
    <line x1="760" y1="160" x2="826" y2="129"/>
    <line x1="760" y1="176" x2="826" y2="207"/>
    <line x1="760" y1="192" x2="826" y2="285"/>
  </g>

  <!-- Goals -->
  <g text-anchor="middle">
    <rect class="box g" x="24" y="21"  width="180" height="50"/>
    <text class="h" x="114" y="42">Цель 1</text>
    <text class="t" x="114" y="58">Поиск багов и дефектов</text>

    <rect class="box g" x="24" y="82"  width="180" height="50"/>
    <text class="h" x="114" y="103">Цель 2</text>
    <text class="t" x="114" y="119">Анализ безопасности</text>

    <rect class="box g" x="24" y="143" width="180" height="50"/>
    <text class="h" x="114" y="164">Цель 3</text>
    <text class="t" x="114" y="180">Качество кода</text>

    <rect class="box g" x="24" y="204" width="180" height="50"/>
    <text class="h" x="114" y="225">Цель 4</text>
    <text class="t" x="114" y="241">Передача знаний</text>

    <rect class="box g" x="24" y="265" width="180" height="50"/>
    <text class="h" x="114" y="286">Цель 5</text>
    <text class="t" x="114" y="302">Соблюдение стандартов</text>
  </g>

  <!-- Claims -->
  <g text-anchor="middle">
    <rect class="box c" x="270" y="35"  width="210" height="74"/>
    <text class="h" x="375" y="59">Тезис 1</text>
    <text class="t" x="375" y="78">Все цели ревью</text>
    <text class="t" x="375" y="94">достигаются дешевле</text>

    <rect class="box c" x="270" y="131" width="210" height="74"/>
    <text class="h" x="375" y="155">Тезис 2</text>
    <text class="t" x="375" y="174">Человеческое ревью</text>
    <text class="t" x="375" y="190">кода - узкое место</text>

    <rect class="box c" x="270" y="227" width="210" height="74"/>
    <text class="h" x="375" y="251">Тезис 3</text>
    <text class="t" x="375" y="270">Баланс затрат и пользы</text>
    <text class="t" x="375" y="286">ревью сместился</text>
  </g>

  <!-- Conclusion -->
  <g text-anchor="middle">
    <rect class="box cc" x="540" y="113" width="220" height="110"/>
    <text class="eyebrow" x="650" y="148">ВЫВОД</text>
    <text class="title" x="650" y="174">Агентное ревью</text>
    <text class="title" x="650" y="193">замещает обязательное</text>
    <text class="title" x="650" y="212">человеческое ревью</text>
  </g>

  <!-- Implications -->
  <g text-anchor="middle">
    <rect class="box i" x="830" y="21"  width="346" height="60"/>
    <text class="h" x="1003" y="44">Следствие 1</text>
    <text class="t" x="1003" y="62">Merge-процесс перестраивается под agent-in-loop гейты</text>

    <rect class="box i" x="830" y="99"  width="346" height="60"/>
    <text class="h" x="1003" y="122">Следствие 2</text>
    <text class="t" x="1003" y="140">Роли смещаются к спецификатору и оркестратору</text>

    <rect class="box i" x="830" y="177" width="346" height="60"/>
    <text class="h" x="1003" y="200">Следствие 3</text>
    <text class="t" x="1003" y="218">Сжатие feedback loop в open-source и онбординге</text>

    <rect class="box i" x="830" y="255" width="346" height="60"/>
    <text class="h" x="1003" y="278">Следствие 4</text>
    <text class="t" x="1003" y="296">Инструменты CI/CD, IDE и платформ для агентного ревью</text>
  </g>
</svg>
