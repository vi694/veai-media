  <text x="130" y="360" fill="#cbd5e1" font-family="Arial" font-size="22">Gradle test</text>
  <rect x="470" y="135" width="260" height="270" rx="18" fill="#1e293b" stroke="#38bdf8" stroke-width="3"/>
